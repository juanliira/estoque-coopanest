services:
  web:
    build: .
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
    environment:
      TZ: America/Recife
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: mysql:8.0
    ports:
      - "3310:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: estoque_coopanest
      TZ: America/Recife
    command: --default-time-zone='-03:00'
    volumes:
      - ./sql/banco.sql:/docker-entrypoint-initdb.d/banco.sql
    restart: unless-stopped